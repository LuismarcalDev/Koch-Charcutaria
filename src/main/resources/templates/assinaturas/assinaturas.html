<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koch Charcutaria - Assinaturas</title>
    <link rel="icon" th:href="@{/imagens/logo.png}" />
    <link rel="stylesheet" th:href="@{/css/site-layout.css}">
    <link rel="stylesheet" th:href="@{/css/assinaturas.css}">
</head>

<body class="site-body" id="navI">
<script src="https://unpkg.com/scrollreveal"></script>

<div th:replace="~{fragments/site-header :: header}"></div>

<main class="page-main">
    <div class="alinha">
        <div class="comercialimg">
            <div class="texto-sobre-imagem">Cestas:<br>Apenas para Assinantes</div>
        </div>
    </div>

    <div th:if="${msgAssinaturaOk}" class="assinaturas-alerta assinaturas-alerta--ok" th:text="${msgAssinaturaOk}"></div>
    <div th:if="${msgAssinaturaErro}" class="assinaturas-alerta assinaturas-alerta--erro" th:text="${msgAssinaturaErro}"></div>

    <div id="produtos-container">
        <p th:if="${#lists.isEmpty(cestas)}" class="assinaturas-vazio">
            Nenhuma cesta cadastrada no momento. O administrador pode criar cestas no painel admin.
        </p>

        <div class="produto" th:each="cesta : ${cestas}">
            <div class="descricao">
                <div class="foto-card">
                    <img class="produto-foto"
                         th:src="${cesta.imagemUrl != null ? cesta.imagemUrl : '/imagens/img1catalogo.jpeg'}"
                         th:alt="${cesta.nome}">
                    <div class="foto-card-preco"
                         th:text="'R$ ' + ${#numbers.formatDecimal(cesta.preco, 1, 2)}">R$ 0,00</div>

                    <form th:action="@{/assinaturas/{id}/assinar(id=${cesta.id})}" method="post" class="form-assinar">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="foto-card-btn">Assinar 🍽️</button>
                    </form>
                </div>
                <div class="descricao-texto">
                    <span class="subtitulo-cesta">Cesta</span>
                    <strong class="produto-nome" th:text="${cesta.nome}">Nome</strong>
                    <p th:text="${cesta.descricao}">Descrição da cesta.</p>
                </div>
            </div>
            <div class="bloco-selos">
                <img th:src="@{/imagens/selo1.png}" alt="Selo 1">
                <img th:src="@{/imagens/selo2.png}" alt="Selo 2">
                <img th:src="@{/imagens/selo3.png}" alt="Selo 3">
                <img th:src="@{/imagens/selo4.png}" alt="Selo 4">
                <img th:src="@{/imagens/selo5.png}" alt="Selo 5">
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/site-footer :: footer}"></div>

<script th:src="@{/js/site-nav.js}" defer></script>
<script th:src="@{/js/assinaturas.js}"></script>
</body>
</html>
