<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador - Koch</title>
    <link rel="stylesheet" th:href="@{/css/admin/login.css}">
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-logo">
        <img th:src="@{/img/logo.png}" alt="Logo Koch">
    </div>

    <nav class="cabecalho-menu">
        <a href="#">Início</a>
        <a href="#">História</a>
        <a href="#">Catálogo</a>
        <a href="#">Assinaturas</a>
    </nav>

    <div class="cabecalho-contato">
        <a href="#">Contato</a>
    </div>
</header>

<main class="conteudo">
    <section class="caixa-login">
        <h1>Login Administrador</h1>

        <div class="mensagem erro" th:if="${param.error}">
            Usuário ou senha inválidos.
        </div>

        <div class="mensagem sucesso" th:if="${param.logout}">
            Logout realizado com sucesso.
        </div>

        <div class="mensagem sucesso" th:if="${param.cadastroSucesso}">
            Cadastro realizado com sucesso.
        </div>

        <form th:action="@{/login}" method="post" class="formulario-login">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="campo">
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="campo">
                <label for="password">Senha</label>
                <input id="password" name="password" type="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="botao-entrar">Entrar</button>
        </form>
    </section>
</main>

<footer class="rodape">
    <img th:src="@{/img/logo.png}" alt="Logo Koch">
</footer>

</body>
</html>
