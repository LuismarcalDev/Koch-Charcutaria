<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador - Koch</title>
    <link rel="stylesheet" th:href="@{/css/site-layout.css}">
    <link rel="stylesheet" th:href="@{/css/admin/login.css}">
</head>
<body class="site-body">

<div th:replace="~{fragments/site-header :: header}"></div>

<main class="conteudo page-main">
    <section class="caixa-login">
        <h1>Login Administrador</h1>

        <div class="mensagem erro" th:if="${param.error}">
            Usuário ou senha inválidos.
        </div>

        <div class="mensagem sucesso" th:if="${param.logout}">
            Logout realizado com sucesso.
        </div>

        <form th:action="@{/login}" method="post" class="formulario-login">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="campo">
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="campo">
                <label for="password">Senha</label>
                <input id="password" name="password" type="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="botao-entrar">Entrar</button>
        </form>

        <p class="auth-links">
            <a th:href="@{/cliente/login}">Área do cliente</a>
        </p>
    </section>
</main>

<div th:replace="~{fragments/site-footer :: footer}"></div>
<script th:src="@{/js/site-nav.js}" defer></script>
</body>
</html>
