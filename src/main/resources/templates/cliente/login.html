<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/site-layout.css}">
    <link rel="stylesheet" th:href="@{/cliente/css/login.css}">
    <link rel="stylesheet" th:href="@{/cliente/css/cliente-mensagens.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Login - Koch Charcutaria</title>
</head>
<body class="site-body cliente-auth-page">

<div class="cliente-toast-stack" aria-live="polite">
    <div th:if="${param.error}" class="cliente-toast cliente-toast--erro" role="alert">
        <span class="cliente-toast__icon" aria-hidden="true">
            <img th:src="@{/cliente/img/erro-login.svg}" alt="">
        </span>
        <span class="cliente-toast__text">E-mail ou senha inválidos. Verifique e tente novamente.</span>
    </div>
    <div th:if="${param.logout}" class="cliente-toast cliente-toast--ok" role="status">
        <span class="cliente-toast__icon" aria-hidden="true"><i class="fa-solid fa-circle-check"></i></span>
        <span class="cliente-toast__text">Você saiu com sucesso.</span>
    </div>
    <div th:if="${param.cadastroSucesso}" class="cliente-toast cliente-toast--ok" role="status">
        <span class="cliente-toast__icon" aria-hidden="true"><i class="fa-solid fa-circle-check"></i></span>
        <span class="cliente-toast__text">Cadastro realizado com sucesso. Faça login para continuar.</span>
    </div>
</div>

<div th:replace="~{fragments/site-header :: header}"></div>

<main>
    <div class="login">
        <img th:src="@{/cliente/img/logo.png}" alt="Logo Koch">
        <div class="subLogin">
            <h2>Faça Login</h2>

            <form th:action="@{/cliente/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="redirect" th:if="${param.redirect != null}" th:value="${param.redirect[0]}">
                <div class="inputs">
                    <div class="solo">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Informe seu E-mail" required>
                    </div>
                    <div class="solo">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="Informe sua Senha" required>
                    </div>
                    <div class="double">
                        <button type="submit">Fazer Login</button>
                        <p><a th:href="@{/cliente/cadastro}">Cadastre-se</a></p>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/site-footer :: footer}"></div>

<script th:src="@{/js/site-nav.js}" defer></script>
<script>
(function () {
    var params = new URLSearchParams(window.location.search);
    if (!params.has('error')) return;
    params.delete('error');
    var q = params.toString();
    var next = window.location.pathname + (q ? '?' + q : '') + window.location.hash;
    history.replaceState(null, '', next);
})();
</script>
</body>
</html>
