spring.application.name=Koch
server.port=8080
spring.thymeleaf.cache=false

# Banco de dados MySQL
# sslMode=DISABLED: evita TLS local quando o certificado do servidor ainda não está válido (CertificateNotYetValidException).
# Em produção com SSL, use VERIFY_CA/VERIFY_IDENTITY e certificado com datas corretas (ou sincronize relógios).
spring.datasource.url=jdbc:mysql://localhost:3306/ProjetoIntegrador?sslMode=DISABLED
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Upload de imagens das cestas
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
koch.upload.dir=uploads/cestas
